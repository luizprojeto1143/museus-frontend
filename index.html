<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Cultura Viva - Patrimônio, Tecnologia e Inclusão</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Cultura Viva - Plataforma digital para museus e cidades históricas. Patrimônio, Tecnologia e Inclusão." />
  <meta name="theme-color" content="#2a1a11" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json">
  <script>
    // Correção para erros de carregamento de chunks (comum após novo deploy)
    window.addEventListener('unhandledrejection', (event) => {
      const errorMsg = event.reason?.message || '';
      if (errorMsg.includes('Failed to fetch dynamically imported module') || 
          errorMsg.includes('loading chunk')) {
        console.warn('Chunk load error detected. Auto-reloading app...');
        window.location.reload();
      }
    });
    window.addEventListener('error', (e) => {
      if (e.message && e.message.includes('Failed to fetch dynamically imported module')) {
        window.location.reload();
      }
    }, true);
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <!-- Force Rebuild: PWA Assets Check -->
</body>

</html>
